name: Formal Release Verification

on:
  workflow_dispatch:
    inputs:
      backend_sha:
        description: Exact backend commit SHA
        required: true
        type: string
      frontend_sha:
        description: Exact frontend commit SHA
        required: true
        type: string
      infra_sha:
        description: Exact infra commit SHA
        required: true
        type: string

permissions:
  contents: read

env:
  UV_PYTHON_DOWNLOADS: never

jobs:
  formal:
    name: Fixed formal candidate verification
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Validate immutable source refs
        shell: bash
        env:
          BACKEND_SHA: ${{ inputs.backend_sha }}
          FRONTEND_SHA: ${{ inputs.frontend_sha }}
          INFRA_SHA: ${{ inputs.infra_sha }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          sha_pattern='^[0-9a-f]{40}$'
          for sha in "$BACKEND_SHA" "$FRONTEND_SHA" "$INFRA_SHA" "$WORKFLOW_SHA"; do
            [[ "$sha" =~ $sha_pattern ]] || exit 1
          done
          [[ "$BACKEND_SHA" == "$WORKFLOW_SHA" ]]

      - name: Check out backend
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: stoasystem/stoa-backend
          ref: ${{ inputs.backend_sha }}
          path: stoa-backend
          fetch-depth: 1
          persist-credentials: false

      - name: Check out frontend
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: stoasystem/stoa-frontend
          ref: ${{ inputs.frontend_sha }}
          path: stoa-frontend
          fetch-depth: 1
          persist-credentials: false

      - name: Check out infra
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: stoasystem/stoa-infra
          ref: ${{ inputs.infra_sha }}
          path: stoa-infra
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.12.13

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: 0.11.16
          enable-cache: false

      - name: Verify checkout identities
        shell: bash
        env:
          BACKEND_SHA: ${{ inputs.backend_sha }}
          FRONTEND_SHA: ${{ inputs.frontend_sha }}
          INFRA_SHA: ${{ inputs.infra_sha }}
        run: |
          set -euo pipefail
          test "$(git -C "$GITHUB_WORKSPACE/stoa-backend" rev-parse HEAD)" = "$BACKEND_SHA"
          test "$(git -C "$GITHUB_WORKSPACE/stoa-frontend" rev-parse HEAD)" = "$FRONTEND_SHA"
          test "$(git -C "$GITHUB_WORKSPACE/stoa-infra" rev-parse HEAD)" = "$INFRA_SHA"

      - name: Prepare and prove Linux namespaces
        shell: bash
        run: |
          set -euo pipefail
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if [[ -e /proc/sys/kernel/unprivileged_userns_clone ]]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          /usr/bin/unshare --user --map-root-user --net -- true
          /usr/bin/unshare --user --map-root-user --pid --fork --mount-proc \
            --kill-child=SIGKILL -- /usr/bin/dash -c 'test "$$" -eq 1'

      - name: Create private evidence directory
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          evidence_dir="$(mktemp -d "$RUNNER_TEMP/stoa-formal-evidence.XXXXXX")"
          chmod 0700 "$evidence_dir"
          test "$(stat -c %a "$evidence_dir")" = "700"
          printf 'EVIDENCE_DIR=%s\n' "$evidence_dir" >> "$GITHUB_ENV"

      - name: Issue release candidate
        working-directory: stoa-backend
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release_gate.py candidate \
            --backend-root "$GITHUB_WORKSPACE/stoa-backend" \
            --frontend-root "$GITHUB_WORKSPACE/stoa-frontend" \
            --infra-root "$GITHUB_WORKSPACE/stoa-infra" \
            --output "$EVIDENCE_DIR/candidate.json"

      - name: Run fixed formal aggregate
        working-directory: stoa-backend
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release_gate.py formal \
            --candidate "$EVIDENCE_DIR/candidate.json" \
            --backend-root "$GITHUB_WORKSPACE/stoa-backend" \
            --frontend-root "$GITHUB_WORKSPACE/stoa-frontend" \
            --infra-root "$GITHUB_WORKSPACE/stoa-infra" \
            --output "$EVIDENCE_DIR/formal.json"
