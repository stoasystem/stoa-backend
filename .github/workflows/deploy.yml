name: Deploy Backend

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    name: Build Lambda package & Update function
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build Lambda deployment package (linux arm64 wheels)
        run: python scripts/build_lambda_dist.py --zip lambda.zip

      - name: Verify Lambda dist provenance
        run: python scripts/build_lambda_dist.py --verify-only

      - name: Package summary
        run: |
          echo "Package size: $(du -sh lambda.zip | cut -f1)"
          python -m json.tool dist/.stoa-build-manifest.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::562923011260:role/stoa-github-backend-deploy
          aws-region: eu-central-2

      - name: Preflight Lambda update permissions
        run: |
          for function_name in stoa-api stoa-weekly-report; do
            aws lambda update-function-code \
              --function-name "$function_name" \
              --zip-file fileb://lambda.zip \
              --region eu-central-2 \
              --dry-run
            aws lambda get-function-configuration \
              --function-name "$function_name" \
              --region eu-central-2 \
              >/dev/null
          done

      - name: Update Lambda function code
        run: |
          for function_name in stoa-api stoa-weekly-report; do
            aws lambda update-function-code \
              --function-name "$function_name" \
              --zip-file fileb://lambda.zip \
              --region eu-central-2
          done

      - name: Wait for update to complete
        run: |
          for function_name in stoa-api stoa-weekly-report; do
            aws lambda wait function-updated \
              --function-name "$function_name" \
              --region eu-central-2
          done
          echo "Lambda functions updated successfully"
